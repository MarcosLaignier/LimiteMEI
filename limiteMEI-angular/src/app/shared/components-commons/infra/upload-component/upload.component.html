<div class="upload-container">
  <div class="upload-card">
    <div class="upload-area"
         [class.has-file]="selectedFile"
         [class.drag-over]="isDragging"
         (click)="fileInput.click()"
         (dragover)="onDragOver($event)"
         (dragleave)="onDragLeave($event)"
         (drop)="onDrop($event)">

      <input type="file" (change)="onFileSelected($event)" #fileInput hidden
             accept="image/jpeg,image/png,application/pdf,video/mp4">

      @if (!selectedFile) {
        <div class="upload-placeholder">
          <i class="bi bi-cloud-arrow-up"></i>
          <p>Clique ou arraste um arquivo para selecionar</p>
          <span>Formatos aceitos: PDF, Imagens, Vídeos</span>
        </div>
      }

      @if (selectedFile) {
        <div class="file-selected">
          <i class="bi bi-file-earmark-check"></i>
          <div class="file-details">
            <p class="file-name">{{ selectedFile.name }}</p>
            <p class="file-size">{{ (selectedFile.size / 1024).toFixed(2) }} KB</p>
          </div>
          <button type="button" class="btn-remove" (click)="removerArquivo($event)">
            <i class="bi bi-x"></i>
          </button>
        </div>
      }
    </div>

    <div class="upload-actions">
      <button class="btn-upload"
              (click)="uploadArquivo()"
              [disabled]="!selectedFile || isUploading">
        @if (!isUploading) {
          <span>
          <i class="bi bi-send"></i> Enviar Arquivo
        </span>
        }

        @if (isUploading) {
          <span class="spinner-container">
          <span class="spinner"></span> Enviando...
        </span>
        }
      </button>
    </div>

    @if (uploadStatus) {
      <div class="status-message" [ngClass]="statusClass">
        <i [class]="statusIcon"></i>
        {{ uploadStatus }}
      </div>
    }
  </div>
</div>
