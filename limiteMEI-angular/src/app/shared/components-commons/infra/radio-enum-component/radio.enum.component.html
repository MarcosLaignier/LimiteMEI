<div [ngClass]="colClass">
  <label class="form-label">{{ label + ':'}}</label>

  @for (opt of enumOptions; track opt) {
    <div
      class="form-check"
      [ngClass]="{ 'form-check-inline': inline }">
      <input
        class="form-check-input"
        type="radio"
        [name]="label"
        [id]="label + '_' + opt.key"
        [value]="opt.key"
        [checked]="dataField === opt.key"
        (change)="dataField = opt.key"
        [disabled]="disabled">
      <label class="form-check-label" [for]="label + '_' + opt.key">
        {{ opt.value }}
      </label>
    </div>
  }
</div>
