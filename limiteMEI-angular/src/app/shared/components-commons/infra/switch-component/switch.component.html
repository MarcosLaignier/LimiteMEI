<div class="form-check form-switch">
  <input
    class="form-check-input"
    type="checkbox"
    role="switch"
    [id]="id"
    [checked]="dataField"
    [disabled]="disabled"
    (change)="onToggle($event)"/>

  @if (label) {
    <label
      class="form-check-label"
      [for]="id"
    >
      {{ label }}
    </label>
  }
</div>
